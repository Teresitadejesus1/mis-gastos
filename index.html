<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Gastos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f2f2f0;
    --border: #e5e5e3;
    --border2: #d0d0ce;
    --text: #1a1a18;
    --text2: #6b6b68;
    --text3: #a0a09e;
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --blue-text: #1d4ed8;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --green-text: #15803d;
    --red: #dc2626;
    --red-light: #fef2f2;
    --red-text: #b91c1c;
    --yellow: #d97706;
    --yellow-light: #fffbeb;
    --yellow-text: #b45309;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left h1 { font-size: 18px; font-weight: 600; }
  .header-left p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .sync-status { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 24px 0;
  }
  .month-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border2);
    background: var(--surface);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .month-btn:hover { background: var(--surface2); }
  .month-label { font-size: 18px; font-weight: 600; min-width: 200px; text-align: center; }

  /* MAIN */
  .main { max-width: 780px; margin: 0 auto; padding: 20px 24px 60px; }

  /* SUMMARY GRID */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .progress-wrap { height: 4px; background: var(--border); border-radius: 99px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width .4s; }
  .progress-fill.warn { background: var(--yellow); }
  .progress-fill.danger { background: var(--red); }

  /* SECTIONS */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .section-header:hover { background: var(--surface2); }
  .section-title { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 14px; }
  .section-icon { font-size: 18px; }
  .section-right { display: flex; align-items: center; gap: 10px; }
  .section-amount { font-size: 13px; color: var(--text2); font-weight: 500; }
  .section-pct { font-size: 11px; background: var(--surface2); border-radius: 99px; padding: 2px 8px; color: var(--text2); }
  .chevron { color: var(--text3); font-size: 12px; transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }

  .items-body { border-top: 1px solid var(--border); }

  .expense-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-row:hover { background: var(--surface2); }
  .expense-row.is-paid .item-name { color: var(--text3); text-decoration: line-through; }

  .check-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s; font-size: 12px;
  }
  .check-circle:hover { border-color: var(--green); }
  .check-circle.checked { background: var(--green); border-color: var(--green); color: #fff; }

  .item-name { flex: 1; font-size: 14px; }
  .item-amount { font-size: 14px; font-weight: 500; color: var(--text2); }
  .item-amount.paid { color: var(--green); }

  .badge {
    font-size: 11px; border-radius: 99px; padding: 2px 9px; font-weight: 500;
  }
  .badge.pagado { background: var(--green-light); color: var(--green-text); }
  .badge.pendiente { background: var(--yellow-light); color: var(--yellow-text); }

  .delete-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 14px; padding: 2px 4px;
    border-radius: 4px; transition: color .15s;
  }
  .delete-btn:hover { color: var(--red); }

  /* ADD VARIABLE ROW */
  .add-row {
    display: flex; gap: 8px; padding: 10px 16px;
    background: var(--surface2); border-top: 1px solid var(--border);
  }
  .add-row input {
    padding: 7px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit;
    background: var(--surface); color: var(--text);
  }
  .add-row input:focus { outline: none; border-color: var(--blue); }
  .add-row input.name-input { flex: 1; }
  .add-row input.amt-input { width: 120px; }
  .add-row button {
    padding: 7px 14px;
    background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: background .15s;
  }
  .add-row button:hover { background: var(--blue-text); }

  /* BOTTOM CARDS */
  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card-title span { font-size: 18px; }
  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .field input, .field textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 14px; font-family: inherit;
    background: var(--surface2); color: var(--text);
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--blue); background: var(--surface); }
  .field textarea { resize: vertical; min-height: 80px; }
  .ahorro-diff { font-size: 12px; margin-top: 6px; }
  .ahorro-diff.ok { color: var(--green); }
  .ahorro-diff.low { color: var(--red); }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; z-index: 999;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: var(--text2); }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .bottom-grid { grid-template-columns: 1fr; }
    .month-label { font-size: 15px; min-width: 160px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando tus gastos...</p>
</div>

<div class="header">
  <div class="header-left">
    <h1>💸 Mis Gastos</h1>
    <p>Control mensual personal</p>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">Sincronizado</span>
  </div>
</div>

<div class="month-nav">
  <button class="month-btn" onclick="changeMonth(-1)">◀</button>
  <div class="month-label" id="month-label"></div>
  <button class="month-btn" onclick="changeMonth(1)">▶</button>
</div>

<div class="main">
  <div class="summary-grid">
    <div class="stat">
      <div class="stat-label">Ingreso</div>
      <div class="stat-value green" id="s-ingreso">$2.100.000</div>
      <div class="stat-sub">ingreso del mes</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total gastos</div>
      <div class="stat-value" id="s-gastos">—</div>
      <div class="stat-sub" id="s-gastos-pct">—% del ingreso</div>
    </div>
    <div class="stat">
      <div class="stat-label">Balance libre</div>
      <div class="stat-value" id="s-balance">—</div>
      <div class="progress-wrap"><div class="progress-fill" id="s-bar" style="width:0%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-label">Pagado</div>
      <div class="stat-value green" id="s-pagado">—</div>
      <div class="stat-sub" id="s-pagado-count">0 ítems</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pendiente</div>
      <div class="stat-value yellow" id="s-pendiente">—</div>
      <div class="stat-sub" id="s-pendiente-count">0 ítems</div>
    </div>
    <div class="stat">
      <div class="stat-label">Ahorro</div>
      <div class="stat-value blue" id="s-ahorro">—</div>
      <div class="stat-sub" id="s-ahorro-meta">meta: —</div>
    </div>
  </div>

  <div id="sections-container"></div>

  <div class="bottom-grid">
    <div class="card">
      <div class="card-title"><span>🐷</span> Ahorro del mes</div>
      <div class="field">
        <label>Ingreso real del mes</label>
        <input type="number" id="ingreso-real" placeholder="2100000" oninput="debounceSave()">
      </div>
      <div class="field">
        <label>Meta de ahorro</label>
        <input type="number" id="meta-ahorro" placeholder="ej: 200000" oninput="debounceSave()">
      </div>
      <div class="field">
        <label>Ahorro real depositado</label>
        <input type="number" id="ahorro-real" placeholder="ej: 150000" oninput="debounceSave()">
        <div class="ahorro-diff" id="ahorro-diff"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span>📝</span> Notas del mes</div>
      <div class="field">
        <textarea id="notas" placeholder="Observaciones, metas, recordatorios para este mes..." oninput="debounceSave()"></textarea>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANeXKGTYsEM6MmAmNY2ddAiDkYvF6BgxI",
  authDomain: "gastos-personales-779e3.firebaseapp.com",
  projectId: "gastos-personales-779e3",
  storageBucket: "gastos-personales-779e3.firebasestorage.app",
  messagingSenderId: "265841936671",
  appId: "1:265841936671:web:4ad2676ad96f99cee9882a",
  measurementId: "G-1KSM43Y473"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const INGRESO_BASE = 2100000;
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const CATEGORIES = [
  { id:'casa', label:'Casa', icon:'🏠', items:[
    {id:'arriendo',name:'Arriendo',amount:570000},
    {id:'nana',name:'Mitad nana',amount:70000},
    {id:'ggcc',name:'Gastos comunes',amount:70000},
    {id:'cuentas',name:'Mitad cuentas',amount:45000},
  ]},
  { id:'silvio', label:'Silvio', icon:'🐾', items:[
    {id:'comida',name:'Comida Silvio',amount:68000},
    {id:'paseos',name:'Paseos Silvio',amount:80000},
  ]},
  { id:'deudas', label:'Deudas', icon:'💳', items:[
    {id:'credito',name:'Crédito papás',amount:250000},
  ]},
  { id:'transporte', label:'Transporte', icon:'🚗', items:[
    {id:'bencina',name:'Bencina',amount:55000},
    {id:'micro',name:'Micro / transporte',amount:30000},
    {id:'seguro',name:'Seguro auto',amount:89000},
  ]},
  { id:'salud', label:'Salud', icon:'💊', items:[
    {id:'farmacia',name:'Farmacia',amount:30000},
    {id:'psicologa',name:'Psicóloga',amount:80000},
  ]},
  { id:'variables', label:'Gastos variables', icon:'🛒', items:[] },
];

let currentDate = new Date();
let currentMonth = currentDate.getMonth();
let currentYear = currentDate.getFullYear();
let state = {};
let openSections = {};
let saveTimer = null;

function getKey() { return `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`; }

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-CL');
}

function setSyncing(active) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (active) {
    dot.classList.add('syncing');
    txt.textContent = 'Guardando...';
  } else {
    dot.classList.remove('syncing');
    txt.textContent = 'Sincronizado';
  }
}

async function loadFromFirebase() {
  try {
    const ref = doc(db, 'gastos', getKey());
    const snap = await getDoc(ref);
    if (snap.exists()) {
      state = snap.data();
    } else {
      state = { items:{}, extraItems:{}, savings:{}, notas:'', openSections:{} };
    }
  } catch(e) {
    console.error(e);
    state = { items:{}, extraItems:{}, savings:{}, notas:'', openSections:{} };
  }
  openSections = state.openSections || {};
  CATEGORIES.forEach(c => { if(!(c.id in openSections)) openSections[c.id] = true; });
}

async function saveToFirebase() {
  setSyncing(true);
  state.openSections = openSections;
  state.savings = {
    ingreso: document.getElementById('ingreso-real').value,
    meta: document.getElementById('meta-ahorro').value,
    real: document.getElementById('ahorro-real').value,
  };
  state.notas = document.getElementById('notas').value;
  try {
    await setDoc(doc(db, 'gastos', getKey()), state);
  } catch(e) { console.error(e); }
  setSyncing(false);
  updateSummary();
}

function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 800);
  updateSummary();
}

window.debounceSave = debounceSave;

function getAllItems(cat) {
  const extras = (state.extraItems && state.extraItems[cat.id]) || [];
  return [...cat.items, ...extras];
}

function toggleCheck(catId, itemId) {
  if (!state.items) state.items = {};
  const key = catId + '|' + itemId;
  state.items[key] = !state.items[key];
  renderSection(catId);
  updateSummary();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 600);
}

window.toggleCheck = toggleCheck;

function addVarItem(catId) {
  const nameEl = document.getElementById('new-name-' + catId);
  const amtEl = document.getElementById('new-amt-' + catId);
  const name = nameEl.value.trim();
  const amount = parseInt(amtEl.value) || 0;
  if (!name) { nameEl.focus(); return; }
  if (!state.extraItems) state.extraItems = {};
  if (!state.extraItems[catId]) state.extraItems[catId] = [];
  state.extraItems[catId].push({ id: 'v' + Date.now(), name, amount });
  nameEl.value = ''; amtEl.value = '';
  renderSection(catId);
  updateSummary();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 600);
}

window.addVarItem = addVarItem;

function removeVarItem(catId, itemId) {
  if (!state.extraItems || !state.extraItems[catId]) return;
  state.extraItems[catId] = state.extraItems[catId].filter(i => i.id !== itemId);
  renderSection(catId);
  updateSummary();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 600);
}

window.removeVarItem = removeVarItem;

function updateVarAmount(catId, itemId, val) {
  if (!state.extraItems || !state.extraItems[catId]) return;
  const item = state.extraItems[catId].find(i => i.id === itemId);
  if (item) item.amount = parseInt(val) || 0;
  updateSummary();
  debounceSave();
}

window.updateVarAmount = updateVarAmount;

function toggleSection(catId) {
  openSections[catId] = !openSections[catId];
  const body = document.getElementById('body-' + catId);
  const chev = document.getElementById('chev-' + catId);
  if (body) body.style.display = openSections[catId] ? 'block' : 'none';
  if (chev) chev.className = 'chevron' + (openSections[catId] ? ' open' : '');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 1000);
}

window.toggleSection = toggleSection;

function renderSection(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const body = document.getElementById('body-' + catId);
  if (!body) return;
  const isVar = catId === 'variables';
  const items = getAllItems(cat);
  let html = '';

  items.forEach(item => {
    const key = catId + '|' + item.id;
    const paid = !!(state.items && state.items[key]);
    const isExtra = !!item.id.startsWith('v');
    html += `<div class="expense-row${paid ? ' is-paid' : ''}">
      <button class="check-circle${paid ? ' checked' : ''}" onclick="toggleCheck('${catId}','${item.id}')" aria-label="${paid ? 'Desmarcar' : 'Marcar pagado'}">
        ${paid ? '✓' : ''}
      </button>
      <span class="item-name">${item.name}</span>
      ${isVar
        ? `<input type="number" value="${item.amount}" style="width:110px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;font-size:13px;text-align:right;font-family:inherit;background:var(--surface2);color:var(--text)" onchange="updateVarAmount('${catId}','${item.id}',this.value)" placeholder="monto">`
        : `<span class="item-amount${paid ? ' paid' : ''}">${fmt(item.amount)}</span>`
      }
      <span class="badge ${paid ? 'pagado' : 'pendiente'}">${paid ? 'pagado' : 'pendiente'}</span>
      ${(isVar && isExtra) ? `<button class="delete-btn" onclick="removeVarItem('${catId}','${item.id}')" aria-label="Eliminar">✕</button>` : ''}
    </div>`;
  });

  if (isVar) {
    html += `<div class="add-row">
      <input class="name-input" type="text" id="new-name-${catId}" placeholder="Descripción (ej: cena, copas, Uber...)">
      <input class="amt-input" type="number" id="new-amt-${catId}" placeholder="Monto">
      <button onclick="addVarItem('${catId}')">+ Agregar</button>
    </div>`;
  }

  body.innerHTML = html;
  updateSectionMeta(catId);
}

function updateSectionMeta(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const items = getAllItems(cat);
  const total = items.reduce((s, i) => s + (parseInt(i.amount) || 0), 0);
  const ingresoVal = parseInt(document.getElementById('ingreso-real')?.value) || INGRESO_BASE;
  const pct = ingresoVal > 0 ? Math.round(total / ingresoVal * 100) : 0;
  const amtEl = document.getElementById('meta-' + catId);
  const pctEl = document.getElementById('pct-' + catId);
  if (amtEl) amtEl.textContent = fmt(total);
  if (pctEl) pctEl.textContent = pct + '%';
}

function buildSections() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const isOpen = openSections[cat.id] !== false;
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <div class="section-header" onclick="toggleSection('${cat.id}')">
        <div class="section-title">
          <span class="section-icon">${cat.icon}</span>
          ${cat.label}
        </div>
        <div class="section-right">
          <span class="section-amount" id="meta-${cat.id}">—</span>
          <span class="section-pct" id="pct-${cat.id}"></span>
          <span class="chevron${isOpen ? ' open' : ''}" id="chev-${cat.id}">▼</span>
        </div>
      </div>
      <div class="items-body" id="body-${cat.id}" style="display:${isOpen ? 'block' : 'none'}"></div>`;
    container.appendChild(div);
    renderSection(cat.id);
  });
}

function updateSummary() {
  let totalGastos = 0, totalPagado = 0, totalPendiente = 0, cntPagado = 0, cntPendiente = 0;
  CATEGORIES.forEach(cat => {
    getAllItems(cat).forEach(item => {
      const amt = parseInt(item.amount) || 0;
      totalGastos += amt;
      const key = cat.id + '|' + item.id;
      if (state.items && state.items[key]) { totalPagado += amt; cntPagado++; }
      else { totalPendiente += amt; cntPendiente++; }
    });
    updateSectionMeta(cat.id);
  });

  const ingresoReal = parseInt(document.getElementById('ingreso-real')?.value) || INGRESO_BASE;
  const ahorroReal = parseInt(document.getElementById('ahorro-real')?.value) || 0;
  const metaAhorro = parseInt(document.getElementById('meta-ahorro')?.value) || 0;
  const balance = ingresoReal - totalGastos - ahorroReal;
  const pctGastos = ingresoReal > 0 ? Math.round(totalGastos / ingresoReal * 100) : 0;
  const pctBar = ingresoReal > 0 ? Math.min(100, Math.round((totalGastos + ahorroReal) / ingresoReal * 100)) : 0;

  document.getElementById('s-ingreso').textContent = fmt(ingresoReal);
  document.getElementById('s-gastos').textContent = fmt(totalGastos);
  document.getElementById('s-gastos-pct').textContent = pctGastos + '% del ingreso';
  document.getElementById('s-pagado').textContent = fmt(totalPagado);
  document.getElementById('s-pagado-count').textContent = cntPagado + ' ítems pagados';
  document.getElementById('s-pendiente').textContent = fmt(totalPendiente);
  document.getElementById('s-pendiente-count').textContent = cntPendiente + ' ítems pendientes';
  document.getElementById('s-ahorro').textContent = fmt(ahorroReal);
  document.getElementById('s-ahorro-meta').textContent = metaAhorro > 0 ? 'meta: ' + fmt(metaAhorro) : 'meta: —';

  const balEl = document.getElementById('s-balance');
  balEl.textContent = fmt(balance);
  balEl.className = 'stat-value ' + (balance >= 0 ? 'green' : 'red');

  const bar = document.getElementById('s-bar');
  bar.style.width = pctBar + '%';
  bar.className = 'progress-fill' + (pctBar > 90 ? ' danger' : pctBar > 75 ? ' warn' : '');

  const diffEl = document.getElementById('ahorro-diff');
  if (diffEl && metaAhorro > 0) {
    const diff = ahorroReal - metaAhorro;
    diffEl.textContent = diff >= 0 ? `✓ ${fmt(diff)} sobre la meta` : `${fmt(Math.abs(diff))} bajo la meta`;
    diffEl.className = 'ahorro-diff ' + (diff >= 0 ? 'ok' : 'low');
  } else if (diffEl) {
    diffEl.textContent = '';
  }
}

window.changeMonth = async function(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  document.getElementById('month-label').textContent = MONTHS[currentMonth] + ' ' + currentYear;
  document.getElementById('loading').style.display = 'flex';
  await loadFromFirebase();
  populateInputs();
  buildSections();
  updateSummary();
  document.getElementById('loading').style.display = 'none';
};

function populateInputs() {
  const s = state.savings || {};
  document.getElementById('ingreso-real').value = s.ingreso || '';
  document.getElementById('meta-ahorro').value = s.meta || '';
  document.getElementById('ahorro-real').value = s.real || '';
  document.getElementById('notas').value = state.notas || '';
}

async function init() {
  document.getElementById('month-label').textContent = MONTHS[currentMonth] + ' ' + currentYear;
  await loadFromFirebase();
  populateInputs();
  buildSections();
  updateSummary();
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
